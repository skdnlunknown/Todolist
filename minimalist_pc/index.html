<!DOCTYPE html>

<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑洞 Todo</title>
    <script>
        (function () {
            var params = new URLSearchParams(location.search);
            if (params.get("view") === "pc") {
                return;
            }

            var ua = navigator.userAgent || "";
            var coarse = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
            var isMobileUA = /Android|iPhone|iPad|iPod|Mobile|Windows Phone/i.test(ua);
            var narrow = window.innerWidth <= 900;
            var shouldUseMobile = isMobileUA || coarse || narrow;

            if (shouldUseMobile) {
                location.replace("../minimalist_mobile/index.html");
            }
        })();
    </script>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><radialGradient id='grad' cx='50%' cy='50%' r='50%'><stop offset='0%' style='stop-color:%23333;stop-opacity:1' /><stop offset='100%' style='stop-color:%23000;stop-opacity:1' /></radialGradient></defs><circle cx='50' cy='50' r='50' fill='url(%23grad)'/><circle cx='50' cy='50' r='45' fill='none' stroke='%23fff' stroke-width='1' opacity='0.3'/><path d='M 50 15 L 85 50 L 50 85 L 15 50 Z' fill='none' stroke='%23fff' stroke-width='2' opacity='0.8'/><circle cx='50' cy='50' r='8' fill='%23fff' opacity='0.9'/></svg>">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <input type="text" id="mainInput" placeholder="输入并回车..." spellcheck="false">
        <ul id="todoList"></ul>
        <div id="stats">
            <span id="totalCount">0 个任务</span> · <span id="doneCount">0 已完成</span>
        </div>
    </div>
    <canvas id="particleCanvas"></canvas>
    <script src="script.js"></script>
</body>

</html>
