<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Todo</title>
    <script>
        (function () {
            var params = new URLSearchParams(location.search);
            var forced = params.get("view");

            if (forced === "mobile") {
                location.replace("minimalist_mobile/index.html?view=mobile");
                return;
            }
            if (forced === "pc") {
                location.replace("minimalist_pc/index.html?view=pc");
                return;
            }

            var ua = navigator.userAgent || "";
            var coarse = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
            var isMobileUA = /Android|iPhone|iPad|iPod|Mobile|Windows Phone/i.test(ua);
            var narrow = window.innerWidth <= 900;
            var shouldUseMobile = isMobileUA || coarse || narrow;

            if (shouldUseMobile) {
                location.replace("minimalist_mobile/index.html");
            } else {
                location.replace("minimalist_pc/index.html");
            }
        })();
    </script>
    <noscript>
        <meta http-equiv="refresh" content="0; url=minimalist_pc/index.html">
    </noscript>
</head>

<body>
</body>

</html>
